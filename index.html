<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBARAI INTELLIGENCE - 人事管理系統</title>
<style>
  :root { --primary:#0a0a0a; --accent:#2563eb; --bg:#fafafa; --card:#fff; --border:#e5e7eb; --text:#1f2937; --text-light:#6b7280; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif; background:var(--bg); color:var(--text); line-height:1.6; min-height:100vh; display:flex; flex-direction:column; }
  .header { background:var(--primary); color:#fff; padding:24px 32px; display:flex; align-items:center; justify-content:space-between; }
  .header h1 { font-size:20px; font-weight:700; letter-spacing:2px; }
  .header .sub { font-size:13px; color:#9ca3af; margin-top:2px; }
  .main { flex:1; display:flex; align-items:center; justify-content:center; padding:40px 20px; }
  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:24px; max-width:900px; width:100%; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:36px 28px; text-align:center; text-decoration:none; color:var(--text); transition:all .2s; }
  .card:hover { border-color:var(--accent); box-shadow:0 8px 24px rgba(37,99,235,.1); transform:translateY(-2px); }
  .card .icon { font-size:48px; margin-bottom:16px; }
  .card h2 { font-size:17px; font-weight:700; margin-bottom:8px; }
  .card p { font-size:13px; color:var(--text-light); }
  .card .tag { display:inline-block; margin-top:12px; padding:4px 12px; background:#eff6ff; color:var(--accent); border-radius:12px; font-size:12px; font-weight:600; }
  .footer { text-align:center; padding:20px; font-size:12px; color:var(--text-light); }
  @media(max-width:700px) { .grid { grid-template-columns:1fr; max-width:400px; } }
</style>
</head>
<body>
<div class="header">
  <div><h1>OBARAI INTELLIGENCE</h1><div class="sub">Human Resources Management</div></div>
</div>
<div class="main">
  <div class="grid">
    <a class="card" href="assessment.html">
      <div class="icon">🧠</div>
      <h2>AI 適性評測</h2>
      <p>8 大維度分析面試者是否適合 AI 領域，產出雷達圖與大數據建議報告</p>
      <span class="tag">30 題評測</span>
    </a>
    <a class="card" href="form.html">
      <div class="icon">📋</div>
      <h2>人員面試表</h2>
      <p>含二吋大頭照上傳、學經歷、面試官評語，資料自動存入 Google Drive</p>
      <span class="tag">面試紀錄</span>
    </a>
    <a class="card" href="onboarding.html">
      <div class="icon">🏢</div>
      <h2>員工入職報到</h2>
      <p>身分證、畢業證書、證照、存摺等附件上傳，一鍵歸檔至 Google Drive</p>
      <span class="tag">入職資料</span>
    </a>
  </div>
</div>
<div class="footer">OBARAI INTELLIGENCE Co., Ltd.（統編 61210989）</div>
</body>
</html>
