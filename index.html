<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBARAI INTELLIGENCE - Human Resources</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  :root { --primary:#0a0a0a; --accent:#2563eb; --bg:#f8f9fa; --card:#fff; --border:#e8eaed; --text:#111827; --text-light:#6b7280; --gold:#b8860b; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',-apple-system,BlinkMacSystemFont,'Noto Sans TC',sans-serif; background:var(--primary); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }

  .header { padding:48px 40px 0; text-align:center; }
  .logo-co { font-size:10px; letter-spacing:4px; color:#6b7280; font-weight:500; text-transform:uppercase; }
  .logo { font-size:36px; font-weight:800; color:#fff; letter-spacing:3px; margin-top:4px; }
  .logo .dot { color:var(--accent); }
  .header-line { width:48px; height:2px; background:var(--accent); margin:20px auto 0; }
  .header-sub { font-size:13px; color:#9ca3af; margin-top:16px; letter-spacing:1px; }

  .main { flex:1; display:flex; align-items:center; justify-content:center; padding:48px 24px 60px; }
  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; max-width:960px; width:100%; }

  .card { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); border-radius:12px; padding:40px 28px 32px; text-align:center; text-decoration:none; color:#fff; transition:all .25s ease; position:relative; overflow:hidden; }
  .card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--accent); transform:scaleX(0); transition:transform .25s ease; }
  .card:hover { background:rgba(255,255,255,.08); border-color:rgba(255,255,255,.15); transform:translateY(-3px); }
  .card:hover::before { transform:scaleX(1); }

  .card-icon { width:52px; height:52px; border-radius:12px; background:rgba(37,99,235,.12); display:flex; align-items:center; justify-content:center; margin:0 auto 20px; }
  .card-icon svg { width:24px; height:24px; stroke:var(--accent); fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }

  .card h2 { font-size:16px; font-weight:700; margin-bottom:10px; letter-spacing:.5px; }
  .card p { font-size:13px; color:#9ca3af; line-height:1.7; }
  .card .tag { display:inline-block; margin-top:16px; padding:4px 14px; border:1px solid rgba(255,255,255,.12); color:#9ca3af; border-radius:20px; font-size:11px; font-weight:600; letter-spacing:.5px; text-transform:uppercase; }

  .footer { text-align:center; padding:24px; font-size:11px; color:#4b5563; letter-spacing:.5px; border-top:1px solid rgba(255,255,255,.05); }

  @media(max-width:700px) { .grid{grid-template-columns:1fr;max-width:400px} .logo{font-size:28px} .header{padding:32px 24px 0} }
</style>
</head>
<body>

<div class="header">
  <div class="logo-co">OBARAI INTELLIGENCE</div>
  <div class="logo">ORBIT<span class="dot">.</span></div>
  <div class="header-line"></div>
  <div class="header-sub">Human Resources Management</div>
</div>

<div class="main">
  <div class="grid">
    <a class="card" href="assessment.html">
      <div class="card-icon">
        <svg viewBox="0 0 24 24"><path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
      </div>
      <h2>AI 適性評測</h2>
      <p>8 大維度綜合分析面試者 AI 領域適性，產出雷達圖與大數據建議報告</p>
      <span class="tag">30 Questions</span>
    </a>
    <a class="card" href="form.html">
      <div class="card-icon">
        <svg viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
      </div>
      <h2>人員面試表</h2>
      <p>含二吋大頭照上傳、學經歷、面試官評核，資料自動歸檔至 Google Drive</p>
      <span class="tag">Interview</span>
    </a>
    <a class="card" href="onboarding.html">
      <div class="card-icon">
        <svg viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
      </div>
      <h2>員工入職報到</h2>
      <p>身分證、畢業證書、證照、存摺等附件上傳，一鍵歸檔至 Google Drive</p>
      <span class="tag">Onboarding</span>
    </a>
  </div>
</div>

<div class="footer">OBARAI INTELLIGENCE Co., Ltd.</div>
</body>
</html>
